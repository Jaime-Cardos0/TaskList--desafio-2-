<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskList</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer type="module"></script>
    <script src="styles.js" type="module"></script>
</head>
<body>
    <main>
        <div class="container">

            <header>
                <input type="text" name="newTask" id="newTask" placeholder="Crie uma tarefa">
                <Button type="button" id="addTaskButton">+</Button>
            </header>

            <hr/>
            
            <div id="taskList"></div>
            
            <div class="footer">
                <span id="taskCount">0 tarefas</span>
                <button type="button" id="clearCompleted">Limpar concluídas</button>
            </div>
            
        </div>
    </main>
</body>
</html>
